<div class="card">
    <div class="card-info">
        <span class="card-titulo">{{ titulo }}</span>
        <span class="card-sub">{{ cantLibros }} {{ cantLibros === 1 ? 'libro' : 'libros' }}</span>
    </div>

    <div class="card-acciones">
        <button class="btn-accion" title="Editar" (click)="abrirModal()">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none">
                <g clip-path="url(#clip0_4418_9713)">
                    <path d="M11 2H9C4 2 2 4 2 9V15C2 20 4 22 9 22H15C20 22 22 20 22 15V13" stroke="var(--texto)"
                        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    <path
                        d="M16.04 3.01928L8.16 10.8993C7.86 11.1993 7.56 11.7893 7.5 12.2193L7.07 15.2293C6.91 16.3193 7.68 17.0793 8.77 16.9293L11.78 16.4993C12.2 16.4393 12.79 16.1393 13.1 15.8393L20.98 7.95928C22.34 6.59928 22.98 5.01928 20.98 3.01928C18.98 1.01928 17.4 1.65928 16.04 3.01928Z"
                        stroke="var(--texto)" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M14.91 4.15039C15.58 6.54039 17.45 8.41039 19.85 9.09039" stroke="var(--texto)"
                        stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round" />
                </g>
                <defs>
                    <clipPath id="clip0_4418_9713">
                        <rect width="24" height="24" fill="white" />
                    </clipPath>
                </defs>
            </svg>
        </button>
        <button class="btn-accion" title="Eliminar" (click)="onEliminar()">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none">
                <g clip-path="url(#clip0_4418_9808)">
                    <path
                        d="M21 5.98047C17.67 5.65047 14.32 5.48047 10.98 5.48047C9 5.48047 7.02 5.58047 5.04 5.78047L3 5.98047"
                        stroke="var(--texto)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M8.5 4.97L8.72 3.66C8.88 2.71 9 2 10.69 2H13.31C15 2 15.13 2.75 15.28 3.67L15.5 4.97"
                        stroke="var(--texto)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    <path
                        d="M18.85 9.14062L18.2 19.2106C18.09 20.7806 18 22.0006 15.21 22.0006H8.79002C6.00002 22.0006 5.91002 20.7806 5.80002 19.2106L5.15002 9.14062"
                        stroke="var(--texto)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M10.33 16.5H13.66" stroke="var(--texto)" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M9.5 12.5H14.5" stroke="var(--texto)" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </g>
                <defs>
                    <clipPath id="clip0_4418_9808">
                        <rect width="24" height="24" fill="var(--texto)" />
                    </clipPath>
                </defs>
            </svg>
        </button>
    </div>
</div>

<app-modal titulo="Editar colección" [abierto]="modalAbierto" [campos]="campos" (guardar)="confirmar($event)"
    (cancelar)="cerrarModal()" />
