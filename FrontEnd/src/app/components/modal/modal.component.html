@if (abierto) {

<div class="overlay" (click)="cerrar()">

    <div class="modal" (click)="$event.stopPropagation()">

        <div class="modal-header">

            <div class="modal-titulo">
                {{ titulo }}
            </div>

            <button class="btn-cerrar" (click)="cerrar()" title="Cerrar">✕</button>

        </div>

        <div class="modal-body">

            @for (campo of campos; track campo.nombre) {

            <div>

                <label [for]="campo.nombre" class="label">

                    {{ campo.label }}

                    @if (campo.requerido) {
                    <span class="asterisco">*</span>
                    }

                </label>

                @if (esSelect(campo)) {

                <select class="select" [id]="campo.nombre" [(ngModel)]="valores[campo.nombre]"
                    [required]="campo.requerido ?? false" [class.requerido]="campo.requerido">

                    <option value="" disabled>Seleccioná una opción</option>

                    @for (opciones of campo.opciones; track opciones.valor) {

                    <option [value]="opciones.valor">{{ opciones.texto }}
                    </option>
                    }

                </select>

                } @else {

                <input class="input" [id]="campo.nombre" [type]="campo.tipo" [placeholder]="campo.placeholder ?? ''"
                    [required]="campo.requerido ?? false" [(ngModel)]="valores[campo.nombre]"
                    [class.requerido]="campo.requerido" />
                }

            </div>
            }

        </div>

        <div class="modal-botones">

            <button class="btn-cancelar" (click)="cerrar()">Cancelar</button>

            <button class="btn-guardar" (click)="confirmar()" [disabled]="valido()">Guardar</button>

        </div>

    </div>

</div>

}
