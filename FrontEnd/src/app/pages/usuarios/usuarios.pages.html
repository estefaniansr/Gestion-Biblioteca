<app-header>
  <!-- Pasas en [activo] el valor de TS  activo (linea 27) y el cambioTab genera un evento-->
</app-header>

<div class="cont">
  <app-titulo [titulo]="titulo" [subtitulo]="subtitulo"></app-titulo>
  <!-- Pasa los @Input del componente titulo y entre "el nombre" -->
  <div class="acciones">

    <app-buscador placeholder="Busca por nombre, DNI o telefono..." (valorChange)="filtrado($event)"></app-buscador>

    <app-boton [texto]="'Nuevo usuario'" (abrir)="modalAbierto = true"></app-boton>
  </div>
</div>

@if(modalAbierto){
<app-modal titulo="Nuevo usuario" [abierto]="modalAbierto" [campos]="CamposModal"
  (guardar)="guardarModalUsuario($event)" (cancelar)="modalAbierto = false" />
}



<div class="tags-container">
  <app-tags titulo="Usuarios" [cantidad]="cantidadUsuarios">
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
      class="icon-header movilNo">
      <g clip-path="url(#clip0_3111_32739)">
        <path
          d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M20.5901 22C20.5901 18.13 16.7402 15 12.0002 15C7.26015 15 3.41016 18.13 3.41016 22"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      </g>
      <defs>
        <clipPath id="clip0_3111_32739">
          <rect width="24" height="24" fill="currentColor" />
        </clipPath>
      </defs>
    </svg>
  </app-tags>
</div>

<app-tabla [columnas]="columnasUsuarios" [datos]="usuariosTabla" [mostrarEliminar]="true"
  [totalItems]="usuariosTabla.length" [itemsPorPagina]="10" [paginaActual]="paginaActual"
  (cambioPagina)="paginaActual = $event" (editar)="editarUsuario($event)" (eliminar)="eliminarUsuarioBoton($event)"
  [camposBloqueados]="['DNI']">
</app-tabla>
