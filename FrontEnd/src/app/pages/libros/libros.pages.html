<main>
    <app-header [activo]="activo"></app-header>
    <div class="cont">
        <app-titulo [titulo]="'Libros'" [subtitulo]="'Gestiona y organiza tus libros.'"></app-titulo>
        <div class="acciones">
            <app-filter [opciones]="['opcion', 'opcion', 'opcion', 'opcion']" (seleccionar)="onFiltrar($event)" />


            <app-buscador placeholder="Buscar libros..." (valorChange)="filtrado($event)" />

            <app-boton [texto]="'Nuevo libro'" (abrir)="modalAbierto = true"></app-boton>
        </div>
    </div>

    <app-modal titulo="Nuevo libro" [abierto]="modalAbierto" [campos]="CamposModal" (guardar)="Guardar($event)"
        (cancelar)="modalAbierto = false" />
