<main>

<app-header [activo]="activo"></app-header>
<div class="cont">
     <app-titulo
        [titulo]="'Categorías'"
        [subtitulo]="'Gestiona las categorías de los libros.'">
    </app-titulo>
    
    <div class="acciones">
<app-buscador
placeholder="Buscar categoría por nombre o descripción..."
(valorChange)="buscar($event)"></app-buscador>
<app-boton
    [texto]="'Nueva categoría'"
    (abrir)="modalAbierto = true">
</app-boton>
</div>
</div>
<div class="tags-container">
<app-tags titulo="Categorías" [cantidad]="cantidadTotal">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
                class="icon-header movilNo">
                <g clip-path="url(#clip0_4418_169837)">
                    <path
                        d="M4.16989 15.2998L8.69989 19.8298C10.5599 21.6898 13.5799 21.6898 15.4499 19.8298L19.8399 15.4398C21.6999 13.5798 21.6999 10.5598 19.8399 8.6898L15.2999 4.1698C14.3499 3.2198 13.0399 2.7098 11.6999 2.7798L6.69989 3.0198C4.69989 3.1098 3.10989 4.6998 3.00989 6.6898L2.76989 11.6898C2.70989 13.0398 3.21989 14.3498 4.16989 15.2998Z"
                        stroke="var(--acento)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    <path
                        d="M9.49988 12C10.8806 12 11.9999 10.8807 11.9999 9.5C11.9999 8.11929 10.8806 7 9.49988 7C8.11917 7 6.99988 8.11929 6.99988 9.5C6.99988 10.8807 8.11917 12 9.49988 12Z"
                        stroke="var(--acento)" stroke-width="1.5" stroke-linecap="round" />
                </g>
                <defs>
                    <clipPath id="clip0_4418_169837">
                        <rect width="24" height="24" fill="white" />
                    </clipPath>
                </defs>
            </svg>
</app-tags>
</div>

 <app-modal titulo="Nueva categoria"
  [abierto]="modalAbierto" 
  [campos]="CamposModal" 
  (guardar)="guardar($event)"
    (cancelar)="modalAbierto = false" />
<app-tabla
    [columnas]="columnas"
    [datos]="EjPaginado"
    [mostrarEliminar]="false"
    [totalItems]="datosTablaArray.length"
    [itemsPorPagina]="10"
    [paginaActual]="paginaActual"
    (cambioPagina)="paginaActual = $event"
    (editar)="editar($event.id,$event.datos)">
    
</app-tabla>
</main>
